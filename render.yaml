services:
  - type: web
    name: vektal-afk-bot
    env: node
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: EMAIL
        sync: false
      - key: PASSWORD
        sync: false
